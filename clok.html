<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pink Clock</title>

<style>

html{
    background:transparent;
}
body{
    font-family:'Segoe UI',sans-serif;
    background:transparent;
    margin:0;
}

/* Widget */
.pink-clock{
    width: 100%;
    height: 184px;
    background:linear-gradient(
        135deg,
        #fff5fa,
        #fff5fa
    );
    text-align:center;
}

/* Heart */
.heart{
    font-size:32px;
    color:#ff4f9a;
    animation:heartbeat 1.2s infinite;
}

/* Time */
#clock{
    color:#ff1493;
    font-size:30px;
    font-weight:bold;
    animation:blink 1s infinite;
}

/* Date */
#date{
    margin-top:0px;
    color:#ff1493;
    font-size:16px;
}

/* Welcome text */
.title{
    color:#ff69b4;
    font-size:15px;
    font-weight:500;
    margin-bottom:0px;
}

/* Heart Beat */
@keyframes heartbeat{

    0%{
        transform:scale(1);
    }

    25%{
        transform:scale(1.2);
    }

    50%{
        transform:scale(1);
    }

    75%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }
}

/* Blink Time */
@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:.5;
    }

    100%{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="pink-clock">

    <div class="heart">💗</div>

    <div class="title">
        Thời Gian Hiện Tại
    </div>

    <div id="clock">00:00:00</div>

    <div id="date"></div>

</div>

<script>

function updateClock(){

    const now = new Date();

    let h = String(now.getHours()).padStart(2,'0');
    let m = String(now.getMinutes()).padStart(2,'0');
    let s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById('clock').innerHTML =
        `${h}:${m}:${s}`;

    const days = [
        "Chủ Nhật",
        "Thứ Hai",
        "Thứ Ba",
        "Thứ Tư",
        "Thứ Năm",
        "Thứ Sáu",
        "Thứ Bảy"
    ];

    document.getElementById('date').innerHTML =
        `${days[now.getDay()]}
        - ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
