      /* ===== PANEL CHUNG ===== */

        height:220px;

        border:1px solid #fff;
        margin-bottom:-70px;
        overflow:hidden;
		position: relative;
       
    } 
        
      .playlist-header{ display:flex;

        color:#fff ; font-size:24px;

      .song-grid{
       display:grid;
        grid-template-columns: repeat(4,minmax(0,1fr));

        width:100%;
        height: 115px;
        overflow-y: auto;  
    }
    .song-grid::-webkit-scrollbar{
    width: 5px;
   }
   .song-grid::-webkit-scrollbar-thumb{
    background:#ffd6e9;

}
.song-grid::-webkit-scrollbar-track{
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}
.song-grid::-webkit-scrollbar-thumb:hover{
    background: #ff3d9a;
    box-shadow: 0 0 12px #ff69b4;
}
      .song-grid a{ display:block; 
        padding:4px 10px; 
        text-decoration:none; 
        color:#fff ; 
        border-radius:5px; 
        transition:.3s;
        min-width:0;
        white-space:nowrap;
        text-overflow:ellipsis;
     } 
      .song-grid a:hover{ 
        background: rgba(232, 164, 198, 0.15); 
        transform: translateY(-2px); 
        box-shadow: 0 0 10px rgba(207, 187, 197, 0.5); }
       /* BÀI ĐANG PHÁT */ 
      .song-grid a.playing{ border: 1px solid #fff;

        }

  /* =====LO XO ===== */ 

.spiral-wrapper{

      /* ===== PLAYER ===== */ 
      .player-panel{

    height:420px;
    padding-top:30px;
    background:transparent;

    backdrop-filter:none;

    display:flex;

    align-items:center;

    justify-content:center;

      /* ===== ALBUM ===== */ 
      .album-section{display:flex; justify-content:center; align-items:center; position:relative; } 
     .album-cover{
    width:230px;
    height:230px;
   

    position:relative;

    border-radius:50%;
    border:1px solid #fff;

    overflow:hidden;

    z-index:2;

    animation:spin 25s linear infinite;
    animation-play-state:paused;

    box-shadow:
        0 0 20px rgba(255,105,180,.6),
        0 0 40px rgba(255,105,180,.3);
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.album-cover::after{

    content:"";

    position:absolute;
    

    width:22px;
    height:22px;

    border-radius:50%;
    border:1px solid #ff69b4;

    background:#fff;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);
}
      .album-cover img{ width:100%; height:100%; object-fit:cover; }

        height:4px;

        background:#fff; /* màu nền thanh */
}

        margin:15px auto 0;
        display:flex; 
        justify-content:space-between; 
        color:#ffeaf4; }
        /* ===== CONTROLS ===== */ 
        .controls{ 
        margin-top:15px; 
        display:flex; 
        justify-content:center; 
        align-items:center; 
        gap:15px; }  

.controls button{

    width:60px;
    height:60px;

    border:1px solid #fff ;

    border-radius:50%;

    background:transparent;
    box-shadow:
        0 0 15px rgb(243, 241, 242);

    color:#ffeaf4;

    font-size:22px;

    cursor:pointer;

    transition:.3s;
}
.controls button:hover{

    border-color:#ff69b4;

    color:#fff;

    box-shadow:
        0 0 8px #ff8fc2;

    transform:scale(1.05);
}

  .play-btn{

    width:85px!important;
    height:85px!important;

    border:1px solid #fff !important;

    border-radius:50%!important;

        /* ===== LYRICS ===== */ 
 .lyrics-line{

         /* ===== VISUALIZER ===== */ 
.visualizer{
    display:flex;

	.bar{
    width:8px;

    max-height:44px;

          .bottom-nav{ height:75px; display:flex; justify-content:space-between; align-items:center; padding:0 25px; }

         .couple{ position:absolute; right:20px; bottom:20px; z-index:1; }

<script>
document.addEventListener("DOMContentLoaded", () => {

const audio = document.getElementById("audio");
const visualizer = document.querySelector(".visualizer");

const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const coverImage = document.getElementById("coverImage");

const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");

const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

const songList = document.getElementById("songList");
const playIcon = playBtn.querySelector("i");

/* ================= 20 SONGS ================= */
const songs = [
  { title:"Chỉ Cần Em Bên Anh Thôi", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Chỉ Cần Em Bên Anh Thôi.mp3" },
  { title:"Có Em", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Có Em.mp3" },
  { title:"Dấu Mưa Trong Tim", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Dấu Mưa Trong Tim.mp3" },
  { title:"Hình Như Là Em", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Hình Như Là Em.mp3" },
  { title:"Kiếp Người Mong Manh", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Kiếp Người Mong Manh.mp3" },
  { title:"Lạc Mất Nhau", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Lạc Mất Nhau.mp3" },
  { title:"Một Triệu Lý Do Nhớ Em", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Một-Triệu-Lý-Do-Nhớ-Em.mp3" },
  { title:"Người Ở Lại Sau Chia Tay", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Người Ở Lại Sau Chia Tay.mp3" },
  { title:"Nhớ Người Không Tên", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Nhớ Người Không Tên.mp3" },
  { title:"Vẫn Chờ Em", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Vẫn Chờ Em.mp3" },

  { title:"Xin Lỗi Người Em Từng Thương", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Xin Lỗi Người Em Từng Thương.mp3" },
  { title:"Đường Chân Trời", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Đường-Chân-Trời.mp3" },
  { title:"Nếu Em Muốn Rời Xa", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Nếu Em Muốn Rời Xa.mp3" },
  { title:"Hạnh Phúc Chính Là Em", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Hạnh Phúc Chính Là Em.mp3" },
  { title:"Dấu Yêu", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Dấu-Yêu.mp3" },
  { title:"Dấu Chân Tình Buồn", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Dấu-Chân-Tình-Buồn.mp3" },
  { title:"Đau", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/ĐAU.mp3" },
  { title:"Sợ Yêu", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Sợ Yêu.mp3" },
  { title:"Tha Thứ Lỗi Lầm", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Tha Thứ Lỗi Lầm.mp3" },
  { title:"Một Thời Đã Xa", artist:"Nhạc Chọn Lọc", cover:"ca si/nhạc buồn tâm trạng/phu.jpg", file:"ca si/nhạc buồn tâm trạng/Một Thời Đã Xa.mp3" }
];

let current = 0;

/* ================= LOAD SONG ================= */
function loadSong(i){
  current = i;
  const s = songs[i];

  audio.src = s.file;
  titleEl.textContent = s.title;
  artistEl.textContent = s.artist;
  coverImage.src = s.cover;

  highlight();
  audio.play().catch(()=>{});
}

/* ================= PLAY ================= */

	playBtn.onclick = () => {
  if(!audio.src) return loadSong(0);

  if(audio.paused){
    audio.play();
    playIcon.classList.remove("fa-play");
    playIcon.classList.add("fa-pause");
  } else {
    audio.pause();
    playIcon.classList.remove("fa-pause");
    playIcon.classList.add("fa-play");
  }
};

/* ================= NEXT / PREV ================= */
window.nextSong = () => loadSong((current+1)%songs.length);
window.prevSong = () => loadSong((current-1+songs.length)%songs.length);
playIcon.classList.remove("fa-play");
playIcon.classList.add("fa-pause")

/* ================= AUTO NEXT ================= */
audio.addEventListener("ended", () => {
  nextSong();
});

/* ================= TIME ================= */
audio.addEventListener("timeupdate", () => {
  progress.value = audio.currentTime;
  currentTimeEl.textContent = formatTime(audio.currentTime);
});

audio.addEventListener("loadedmetadata", () => {
  progress.max = audio.duration;
  durationEl.textContent = formatTime(audio.duration);
});

progress.oninput = () => {
  audio.currentTime = progress.value;
};

volume.oninput = () => {
  audio.volume = volume.value / 100;
};

/* ================= FORMAT ================= */
function formatTime(t){
  if(isNaN(t)) return "00:00";
  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  return m + ":" + String(s).padStart(2,"0");
}

/* ================= PLAYLIST FIX ================= */
function render(){
  if(!songList) return;

  songList.innerHTML = songs.map((s,i)=>
    `<a id="s-${i}" onclick="loadSong(${i})">${s.title}</a>`
  ).join("");
}

function highlight(){
  document.querySelectorAll("#songList a")
    .forEach(a => a.classList.remove("playing"));

  const el = document.getElementById(`s-${current}`);
  if(el) el.classList.add("playing");
}

/* ================= INIT ================= */
audio.volume = 1;
render();

});
</script>
