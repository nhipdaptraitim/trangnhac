<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhịp Đập Trái Tim</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;}

body{
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:30px;
background:url("nen.png") center/cover no-repeat;
user-select:none;
}

/* ===== LAYOUT ===== */
.main-wrapper{
width:90vw;
max-width:1100px;
min-width:860px;
display:flex;
flex-direction:column;
gap:18px;
}

/* ===== PANEL ===== */
.playlist-panel,
.player-panel,
.bottom-nav{
background:rgba(255,255,255,.05);
backdrop-filter:blur(2px);
border:1px solid #fff;
border-radius:10px;
}

/* ===== PLAYLIST ===== */
.playlist-panel{
height:220px;
padding:10px;
}

.song-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
height:115px;
overflow-y:auto;
}

.song-grid a{
color:#fff;
text-decoration:none;
padding:4px;
display:block;
}

.song-grid a.playing{
color:#ff69b4;
}

/* ===== PLAYER ===== */
.player-panel{
height:420px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

/* ===== ALBUM ===== */
.album-cover{
width:230px;
height:230px;
border-radius:50%;
overflow:hidden;
animation:spin 25s linear infinite;
animation-play-state:paused;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* ===== VISUALIZER ===== */
.visualizer{
width:100%;
height:60px;
}

#waveCanvas{
width:100%;
height:60px;
}

/* ===== CONTROLS ===== */
.controls button{
width:60px;
height:60px;
border-radius:50%;
background:transparent;
border:1px solid #fff;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="main-wrapper">

<!-- PLAYLIST -->
<div class="playlist-panel">
<div class="song-grid" id="songList"></div>
</div>

<!-- PLAYER -->
<div class="player-panel">

<div class="album-cover">
<img id="coverImage" width="100%" height="100%">
</div>

<div>
<h1 id="title">Chưa phát nhạc</h1>
<h2 id="artist">---</h2>

<input type="range" id="progress" value="0">

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button id="playBtn">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<div class="visualizer">
<canvas id="waveCanvas"></canvas>
</div>

</div>
</div>

</div>

<audio id="audio"></audio>

<script>
/* ===== DATA ===== */
const songs = [
{title:"Chỉ Cần Em Bên Anh Thôi",artist:"Nhạc",file:"ca si/nhạc buồn tâm trạng/Chỉ Cần Em Bên Anh Thôi.mp3",cover:"ca si/nhạc buồn tâm trạng/phu.jpg"},
{title:"Có Em",artist:"Nhạc",file:"ca si/nhạc buồn tâm trạng/Có Em.mp3",cover:"ca si/nhạc buồn tâm trạng/phu.jpg"}
];

/* ===== ELEMENTS ===== */
const audio = document.getElementById("audio");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const cover = document.getElementById("coverImage");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");

/* ===== STATE ===== */
let currentSong = 0;
let started = false;

/* ===== AUDIO VISUALIZER ===== */
let ctx, analyser, source, dataArray, canvas, c;

function initViz(){
if(started) return;
started = true;

ctx = new AudioContext();
analyser = ctx.createAnalyser();
analyser.fftSize = 512;

source = ctx.createMediaElementSource(audio);
source.connect(analyser);
analyser.connect(ctx.destination);

dataArray = new Uint8Array(analyser.frequencyBinCount);

canvas = document.getElementById("waveCanvas");
c = canvas.getContext("2d");

draw();
}

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

c.clearRect(0,0,canvas.width,canvas.height);

c.beginPath();
c.strokeStyle = "#ff69b4";

let w = canvas.width / dataArray.length;
let x = 0;

for(let i=0;i<dataArray.length;i++){
let v = dataArray[i]/255;
let y = v * canvas.height;

if(i===0)c.moveTo(x,y);
else c.lineTo(x,y);

x += w;
}

c.stroke();
}

/* ===== SONG ===== */
function playSong(i){
currentSong = i;
const s = songs[i];

titleEl.textContent = s.title;
artistEl.textContent = s.artist;
cover.src = s.cover;

audio.src = s.file;
audio.play();

initViz();
}

function nextSong(){
currentSong = (currentSong+1)%songs.length;
playSong(currentSong);
}

function prevSong(){
currentSong = (currentSong-1 + songs.length)%songs.length;
playSong(currentSong);
}

/* ===== PLAY BUTTON ===== */
playBtn.onclick = ()=>{
if(!audio.src) playSong(0);
else audio.paused ? audio.play() : audio.pause();
};

/* ===== LIST ===== */
function render(){
document.getElementById("songList").innerHTML =
songs.map((s,i)=>`<a onclick="playSong(${i})">♪ ${s.title}</a>`).join("");
}
render();
</script>

</body>
</html>
