<!DOCTYPE html><!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    background:#fff5fa;
}

.slideshow-container{
    max-width:610px;
    position:relative;
    overflow:hidden;
}

.mySlides{
    display:none;
}

.mySlides img{
    width:610px;
    height:380px;
    object-fit:cover;

}

.text{
    color:#fff;
    font-size:16px;
    padding:10px;
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    background:rgba(0,0,0,0.4);
}

.dot{
    cursor:pointer;
    height:12px;
    width:12px;
    margin:0 4px;
    background-color:#ffeaf4;
    border-radius:50%;
    display:inline-block;
    transition:0.4s;
}

.active,
.dot:hover{
    background-color:#ff4f9a;
}

/* ========================= */
/* HIỆU ỨNG */
/* ========================= */

/* Fade */
.fade{
    animation:fadeEffect 1.5s;
}

@keyframes fadeEffect{
    from{opacity:0;}
    to{opacity:1;}
}

/* Slide từ trái */
.slideLeft{
    animation:slideLeftEffect 1s;
}

@keyframes slideLeftEffect{
    from{
        transform:translateX(-100%);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

/* Slide từ phải */
.slideRight{
    animation:slideRightEffect 1s;
}

@keyframes slideRightEffect{
    from{
        transform:translateX(100%);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

/* Zoom */
.zoom{
    animation:zoomEffect 1s;
}

@keyframes zoomEffect{
    from{
        transform:scale(1.3);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.dots-container{
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="slideshow-container">

    <div class="mySlides">
        <img src="img/IMG_1.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_2.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_3.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_4.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_5.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_6.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_7.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_8.jpg">
        
    </div>

    <div class="mySlides">
        <img src="img/IMG_9.jpg">
        
    </div>

</div>

<div class="dots-container">
    <span class="dot" onclick="currentSlide(0)"></span>
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
    <span class="dot" onclick="currentSlide(4)"></span>
    <span class="dot" onclick="currentSlide(5)"></span>
    <span class="dot" onclick="currentSlide(6)"></span>
    <span class="dot" onclick="currentSlide(7)"></span>
    <span class="dot" onclick="currentSlide(8)"></span>
</div>

<script>

let slideIndex = 0;

const effects = [
    "fade",
    "slideLeft",
    "slideRight",
    "zoom"
];

function showSlides(){

    let slides = document.getElementsByClassName("mySlides");
    let dots = document.getElementsByClassName("dot");

    for(let i=0;i<slides.length;i++){
        slides[i].style.display = "none";
        slides[i].className = "mySlides";
    }

    for(let i=0;i<dots.length;i++){
        dots[i].classList.remove("active");
    }

    let randomEffect =
        effects[Math.floor(Math.random()*effects.length)];

    slides[slideIndex].style.display = "block";
    slides[slideIndex].classList.add(randomEffect);

    dots[slideIndex].classList.add("active");

    slideIndex++;

    if(slideIndex >= slides.length){
        slideIndex = 0;
    }

    setTimeout(showSlides, 5000);
}

function currentSlide(n){

    slideIndex = n;

    let slides = document.getElementsByClassName("mySlides");
    let dots = document.getElementsByClassName("dot");

    for(let i=0;i<slides.length;i++){
        slides[i].style.display = "none";
        slides[i].className = "mySlides";
    }

    for(let i=0;i<dots.length;i++){
        dots[i].classList.remove("active");
    }

    let randomEffect =
        effects[Math.floor(Math.random()*effects.length)];

    slides[n].style.display = "block";
    slides[n].classList.add(randomEffect);

    dots[n].classList.add("active");
}

showSlides();

</script>

</body>
</html>
